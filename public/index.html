<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Share | InstantFrames</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tento štýl schová logo a Secure Transfer nadpis, keď sa v JS prepne sekcia */
        body.hide-brand .top-header {
            display: none !important;
        }
        
        /* Zelené tlačidlo pre Laso Tool */
        .btn-green {
            background-color: #2ecc71 !important;
            color: white !important;
            border: none !important;
            padding: 12px 25px !important;
            border-radius: 8px !important;
            font-weight: 900 !important;
            cursor: pointer !important;
            text-transform: uppercase !important;
        }
        .btn-green:hover {
            background-color: #27ae60 !important;
        }
    </style>
</head>
<body>
    <div id="menu-toggle" onclick="toggleSidebar()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>MENU</h3>
            <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        </div>
       <nav>
    <a href="#" class="nav-item active" id="btn-transfer" onclick="switchTab('transfer')">Secure Transfer</a>
    <a href="#" class="nav-item" id="btn-sketch" onclick="switchTab('sketch')">InstantFrames</a>
    <a href="#" class="nav-item" id="btn-resizer" onclick="switchTab('resizer')">Image Resizer</a>
    <a href="#" class="nav-item" id="btn-lasso" onclick="switchTab('lasso')">Laso Tool</a>
</nav>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <div id="loader-wrapper">
        <div class="loader-content">
            <img src="logo.png" alt="Logo" class="loader-logo bobbing"> 
            <p class="loading-text">Loading...</p>
            <div class="load-bar-container">
                <div class="load-bar-fill"></div> 
            </div>
        </div>
    </div>

    <header class="top-header">
        <img src="logo.png" alt="Logo" class="mobile-only-logo">
        <h1 class="brand-name" style="color: #3498db;">Secure Transfer</h1>
    </header>

    <div id="dynamic-content">
        <div id="section-transfer" class="tab-content main-layout">
            <div class="maskot-container">
                <img src="maskot.png" alt="Maskot" class="side-maskot">
            </div>

            <div class="container animate-content" id="mainContent">
                <section class="upload-section">
                    <input type="file" id="fileInput">
                    <input type="text" id="passwordInput" placeholder="Set download password">
                    <button onclick="uploadFile()" id="uploadBtn">Upload File</button>
                   
                    <div id="progressContainer" style="display:none;">
                        <div id="progressBar"></div>
                    </div>
                    <div id="uploadStatus"></div>
                </section>
                <hr>
                <section class="download-section">
                    <input type="text" id="downloadPassword" placeholder="Enter password to download">
                    <button onclick="checkPassword()">Check Password</button>
                    <div id="downloadStatus"></div>
                </section>
                <div class="footer-info">
                    Files deleted after 3 hours | Max 10MB
                </div>
            </div>
        </div>

        <div id="section-lasso" class="tab-content main-layout" style="display: none;">
            <div class="container animate-content">
                <h2 style="color: #2ecc71;">Laso Tool</h2>
                
                <div id="lasso-step-1" class="upload-section" style="background: white; padding: 30px; border-radius: 15px;">
                    <p style="color: #666;">Najskôr vyberte obrázok, ktorý chcete upraviť.</p>
                    <input type="file" id="lassoInput" accept="image/*" style="border-color: #2ecc71;">
                    <br><br>
                    <button onclick="startLassoEditor()" class="btn-green">Start Laso Tool</button>
                </div>

                <div id="lasso-step-2" style="display: none; background: white; padding: 20px; border-radius: 15px; text-align: center;">
                    <div id="lassoCanvasContainer" style="position: relative; display: inline-block; cursor: crosshair; background-color: #f9f9f9; border: 1px solid #eee;">
                        <canvas id="lassoCanvas" style="max-width: 100%; height: auto;"></canvas>
                    </div>
                    <p style="margin-top: 10px; font-size: 0.8em; color: #888;">Použite pravé tlačidlo myši na kreslenie.</p>
                    <div style="margin-top: 20px;">
                        <button onclick="processLasso()" class="btn-green">Generate Picture</button>
                        <button onclick="resetLasso()" style="background: #95a5a6; color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; margin-left: 10px;">Reset</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="full-ground-line"></div>

    <script src="script.js"></script>
</body>
</html>
