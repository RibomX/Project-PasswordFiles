<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Share</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <h1 class="brand-name">Secure Transfer</h1>
    </header>

    <div class="dashboard-container">
        <div class="maskot-box">
            <img src="maskot.png" alt="Maskot" class="dashboard-maskot">
        </div>

        <div class="container upload-box">
            <section class="upload-section">
                <div class="file-select-group">
                    <button class="grey-file-select" onclick="document.getElementById('fileInput').click()">Vybrať súbor</button>
                    <span id="fileName">Nie je vybraný žiadny súbor</span>
                </div>
                <input type="file" id="fileInput" style="display:none;" onchange="updateFileName()">
                
                <input type="text" id="passwordInput" placeholder="Set download password">
                <button onclick="uploadFile()" id="uploadBtn">Upload File</button>
                
                <div id="progressContainer" style="display:none;">
                    <div id="progressBar"></div>
                    <span id="uploadStatusText">0%</span>
                </div>
                <div id="uploadStatus"></div>
            </section>
        </div>
    </div>

    <div class="full-ground-line"></div>

    <script src="script.js"></script>
</body>
</html>
