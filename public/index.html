<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Transfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-content">
            <img src="logo.png" alt="Logo" class="loader-img">
            <div class="loader-bar-bg">
                <div id="loader-fill"></div>
            </div>
            <h2 class="loading-text">LOADING...</h2>
        </div>
    </div>

    <div id="menu-toggle" onclick="toggleSidebar()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>MENU</h3>
            <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        </div>
        <nav>
            <a href="#" class="active">Secure Transfer</a>
            <a href="#">History</a>
        </nav>
    </div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="page-wrapper">
        <header>
            <h1 class="main-title">Secure Transfer</h1>
        </header>

        <div class="main-layout">
            <div class="maskot-container">
                <img src="maskot.png" alt="Maskot" class="big-maskot">
            </div>

            <div class="container animate-box" id="mainBox">
                <div class="upload-section">
                    <p class="input-label">Upload your file</p>
                    
                    <div class="file-input-wrapper">
                        <button class="custom-file-btn" onclick="document.getElementById('fileInput').click()">Choose file</button>
                        <span id="fileNameDisplay">No file chosen</span>
                        <input type="file" id="fileInput" style="display: none;">
                    </div>

                    <input type="text" id="passwordInput" placeholder="Set download password...">
                    <button class="primary-btn" onclick="uploadFile()">UPLOAD TO CLOUD</button>
                    
                    <div id="progressContainer" style="display:none;">
                        <div id="progressBar"></div>
                    </div>
                    <div id="uploadStatus"></div>
                </div>

                <div class="divider"></div>

                <div class="download-section">
                    <p class="input-label">Download encrypted file</p>
                    <input type="text" id="downloadPassword" placeholder="Enter your secret password...">
                    <button class="primary-btn" onclick="checkPassword()">GET FILE</button>
                    <div id="downloadStatus"></div>
                </div>

                <p class="footer-text">Files deleted after 3 hours | Max 10MB</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
