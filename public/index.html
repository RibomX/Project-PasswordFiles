<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Transfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-content">
            <img src="logo.png" alt="Logo" class="loader-img">
            <div class="loader-bar">
                <div class="loader-progress"></div>
            </div>
            <h2 class="loading-text">LOADING...</h2>
        </div>
    </div>

    <div id="menu-toggle" onclick="toggleSidebar()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>Menu</h3>
            <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        </div>
        <nav>
            <a href="#" class="active">Secure Transfer</a>
            <a href="#">Settings</a>
            <a href="#">About</a>
        </nav>
    </div>
    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="main-content" id="pageContent">
        <header>
            <h1 class="main-title">Secure Transfer</h1>
        </header>

        <div class="hero-section">
            <img src="maskot.png" alt="Maskot" class="maskot">
            
            <div class="upload-container">
                <div class="input-group">
                    <label class="file-label">
                        <input type="file" id="fileInput">
                        <span class="custom-file-btn">Choose file</span>
                        <span id="fileName">No file chosen</span>
                    </label>
                </div>

                <input type="text" id="passwordInput" placeholder="Set download password">
                <button class="action-btn" onclick="uploadFile()">Upload File</button>

                <div class="divider"></div>

                <input type="text" id="downloadPassword" placeholder="Enter password to download">
                <button class="action-btn" onclick="checkPassword()">Check Password</button>

                <p class="footer-note">Files deleted after 3 hours | Max 10MB</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
