<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Share | InstantFrames</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* Tento štýl schová logo a Secure Transfer nadpis, keď sa v JS prepne sekcia */
        body.hide-brand .top-header {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="menu-toggle" onclick="toggleSidebar()">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3>MENU</h3>
            <span class="close-btn" onclick="toggleSidebar()">&times;</span>
        </div>
        <nav>
            <a href="#" class="nav-item active" id="btn-transfer" onclick="switchTab('transfer')">Secure Transfer</a>
            <a href="#" class="nav-item" id="btn-sketch" onclick="switchTab('sketch')">InstantFrames</a>
        </nav>
    </div>

    <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
    
    <div id="loader-wrapper">
        <div class="loader-content">
            <img src="logo.png" alt="Logo" class="loader-logo bobbing"> 
            <p class="loading-text">Loading...</p>
            <div class="load-bar-container">
                <div class="load-bar-fill"></div> 
            </div>
        </div>
    </div>

    <header class="top-header">
        <img src="logo.png" alt="Logo" class="mobile-only-logo">
        <h1 class="brand-name">Secure Transfer</h1>
    </header>

    <div id="dynamic-content">
        <div class="main-layout">
            <div class="maskot-container">
                <img src="maskot.png" alt="Maskot" class="side-maskot">
            </div>

            <div class="container animate-content" id="mainContent">
                <section class="upload-section">
                    <input type="file" id="fileInput">
                    <input type="text" id="passwordInput" placeholder="Set download password">
                    <button onclick="uploadFile()" id="uploadBtn">Upload File</button>
                   
                    <div id="progressContainer" style="display:none;">
                        <div id="progressBar"></div>
                    </div>
                    <div id="uploadStatus"></div>
                </section>

                <hr>

                <section class="download-section">
                    <input type="text" id="downloadPassword" placeholder="Enter password to download">
                    <button onclick="checkPassword()">Check Password</button>
                    <div id="downloadStatus"></div>
                </section>

                <div class="footer-info">
                    Files deleted after 3 hours | Max 10MB
                </div>
            </div>
        </div>
    </div>

    <div class="full-ground-line"></div>

    <script src="script.js"></script>
</body>
</html>
