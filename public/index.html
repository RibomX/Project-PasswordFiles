<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Share</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="themeBtn">Switch to Dark Mode</button>
    </div>

    <div class="container">
        <h1>Secure File Transfer</h1>
        
        <section class="upload-section">
            <input type="file" id="fileInput">
            <input type="text" id="passwordInput" placeholder="Set download password">
            <button onclick="uploadFile()" id="uploadBtn">Upload File</button>
            
            <div id="progressContainer" style="display:none;">
                <div id="progressBar">0%</div>
            </div>
            <div id="uploadStatus"></div>
        </section>

        <hr>

        <section class="download-section">
            <input type="text" id="downloadPassword" placeholder="Enter password to download">
            <button onclick="checkPassword()">Check Password</button>
            <div id="downloadStatus"></div>
        </section>

        <div class="footer-info">
            Files are automatically deleted after 3 hours.<br>
            Maximum file size: 10MB.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
